# Prometheus - ECO-MON ECOTRACK
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: ecotrack
    static_configs:
      - targets:
          - 10.10.1.10:9100
          - 10.10.2.10:9100
          - 10.10.2.20:9100
          - 10.10.2.30:9100
          - 10.10.3.10:9100
          - 10.10.3.20:9100
          - 10.10.4.10:9100
