# HAProxy - ECO-PROXY ECOTRACK
global
    log /dev/log local0
    maxconn 4096
defaults
    mode http
    timeout connect 5000
    timeout client 50000
    timeout server 50000
frontend http_front
    bind *:80
    bind *:443 ssl crt /etc/ssl/ecotrack/certs/proxy.pem force-tlsv13
    default_backend eco_app
backend eco_app
    server app1 10.10.2.10:3000 check
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
